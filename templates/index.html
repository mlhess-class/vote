<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vote</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #333; padding: 2rem; max-width: 600px; margin: auto; }
        h1 { margin-bottom: 1.5rem; }
        .add-form { display: flex; gap: 0.5rem; margin-bottom: 2rem; }
        .add-form input { flex: 1; padding: 0.6rem 0.8rem; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem; }
        button { padding: 0.6rem 1.2rem; border: none; border-radius: 6px; cursor: pointer; font-size: 0.95rem; }
        .btn-add { background: #4f46e5; color: #fff; }
        .btn-vote { background: #16a34a; color: #fff; }
        .btn-reset { background: #dc2626; color: #fff; font-size: 0.85rem; padding: 0.4rem 0.8rem; }
        button:hover { opacity: 0.85; }
        .option { display: flex; align-items: center; gap: 0.75rem; background: #fff; padding: 0.8rem 1rem; border-radius: 8px; margin-bottom: 0.5rem; }
        .option .name { flex: 1; font-weight: 500; }
        .bar-bg { flex: 2; background: #e5e7eb; border-radius: 4px; height: 20px; overflow: hidden; }
        .bar-fill { background: #4f46e5; height: 100%; transition: width 0.3s; }
        .votes { min-width: 3rem; text-align: right; font-variant-numeric: tabular-nums; }
        .empty { color: #888; margin-bottom: 2rem; }
        .footer { margin-top: 2rem; display: flex; justify-content: space-between; align-items: center; color: #888; font-size: 0.9rem; }
    </style>
</head>
<body>
    <h1>Vote</h1>

    <form class="add-form" action="/add" method="post">
        <input type="text" name="name" placeholder="Add an option..." required>
        <button type="submit" class="btn-add">Add</button>
    </form>

    {% if options %}
        {% for opt in options %}
        <div class="option">
            <span class="name">{{ opt.name }}</span>
            <div class="bar-bg">
                <div class="bar-fill" style="width: {{ (opt.votes / total * 100) if total else 0 }}%"></div>
            </div>
            <span class="votes">{{ opt.votes }}</span>
            <form action="/vote/{{ opt.name }}" method="post" style="margin:0">
                <button type="submit" class="btn-vote">Vote</button>
            </form>
        </div>
        {% endfor %}
    {% else %}
        <p class="empty">No options yet. Add one above to get started.</p>
    {% endif %}

    <div class="footer">
        <span>{{ total }} vote{{ "s" if total != 1 else "" }} cast</span>
        {% if options %}
        <form action="/reset" method="post" style="margin:0" onsubmit="return confirm('Reset all votes and options?')">
            <button type="submit" class="btn-reset">Reset</button>
        </form>
        {% endif %}
    </div>
</body>
</html>
