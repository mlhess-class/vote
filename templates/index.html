<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vote</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            background: #0f0f1a;
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(88, 28, 235, 0.15) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(16, 185, 129, 0.1) 0%, transparent 50%);
            color: #e2e8f0;
            padding: 2rem 1rem;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 640px;
        }

        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #a78bfa, #6366f1, #10b981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
        }

        .header p {
            color: #64748b;
            margin-top: 0.4rem;
            font-size: 0.95rem;
        }

        .card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 1.5rem;
            backdrop-filter: blur(12px);
            margin-bottom: 1.5rem;
        }

        .add-form {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .add-form input {
            flex: 1;
            min-width: 120px;
            padding: 0.7rem 1rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            font-size: 0.95rem;
            font-family: inherit;
            background: rgba(255, 255, 255, 0.05);
            color: #e2e8f0;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .add-form input::placeholder { color: #475569; }

        .add-form input:focus {
            border-color: rgba(99, 102, 241, 0.5);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }

        button {
            padding: 0.7rem 1.4rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            font-family: inherit;
            transition: all 0.2s;
        }

        .btn-add {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: #fff;
            box-shadow: 0 2px 12px rgba(99, 102, 241, 0.3);
        }

        .btn-add:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
        }

        .btn-vote {
            background: rgba(16, 185, 129, 0.15);
            color: #34d399;
            border: 1px solid rgba(16, 185, 129, 0.25);
            padding: 0.45rem 0.9rem;
            font-size: 0.8rem;
        }

        .btn-vote:hover {
            background: rgba(16, 185, 129, 0.25);
            transform: translateY(-1px);
            box-shadow: 0 2px 12px rgba(16, 185, 129, 0.2);
        }

        .option {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1rem 1.2rem;
            border-radius: 12px;
            margin-bottom: 0.6rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: background 0.2s, border-color 0.2s;
        }

        .option:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .rank {
            font-size: 0.8rem;
            font-weight: 700;
            color: #475569;
            min-width: 1.5rem;
            text-align: center;
        }

        .rank.gold { color: #fbbf24; }
        .rank.silver { color: #94a3b8; }
        .rank.bronze { color: #d97706; }

        .option-info {
            flex: 1;
            min-width: 0;
        }

        .option-name {
            font-weight: 600;
            font-size: 0.95rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .option-by {
            color: #475569;
            font-size: 0.78rem;
            margin-top: 0.15rem;
        }

        .bar-bg {
            flex: 2;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 6px;
            height: 8px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            border-radius: 6px;
            background: linear-gradient(90deg, #6366f1, #a78bfa);
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .votes {
            min-width: 2.5rem;
            text-align: right;
            font-variant-numeric: tabular-nums;
            font-weight: 600;
            font-size: 0.95rem;
            color: #a78bfa;
        }

        .empty {
            text-align: center;
            padding: 3rem 1rem;
            color: #475569;
        }

        .empty-icon {
            font-size: 2.5rem;
            margin-bottom: 0.75rem;
            opacity: 0.5;
        }

        .footer {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 1.5rem;
            color: #475569;
            font-size: 0.85rem;
        }

        .footer .pill {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 0.35rem 0.9rem;
            border-radius: 20px;
        }

        @media (max-width: 500px) {
            .add-form { flex-direction: column; }
            .bar-bg { display: none; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Vote</h1>
            <p>Add options and vote for your favorites</p>
        </div>

        <div class="card">
            <form class="add-form" action="/add" method="post">
                <input type="text" name="username" placeholder="Your name" required>
                <input type="text" name="name" placeholder="New option" required>
                <button type="submit" class="btn-add">Add</button>
            </form>
        </div>

        {% if options %}
            {% for opt in options %}
            <div class="option">
                <span class="rank {{ 'gold' if loop.index == 1 else 'silver' if loop.index == 2 else 'bronze' if loop.index == 3 else '' }}">{{ loop.index }}</span>
                <div class="option-info">
                    <div class="option-name">{{ opt.name }}</div>
                    <div class="option-by">by {{ opt.added_by }}</div>
                </div>
                <div class="bar-bg">
                    <div class="bar-fill" style="width: {{ (opt.votes / total * 100) if total else 0 }}%"></div>
                </div>
                <span class="votes">{{ opt.votes }}</span>
                <form action="/vote/{{ opt.name }}" method="post" style="margin:0">
                    <button type="submit" class="btn-vote">Vote</button>
                </form>
            </div>
            {% endfor %}
        {% else %}
            <div class="card empty">
                <div class="empty-icon">&#9898;</div>
                <p>No options yet — add one above to get started.</p>
            </div>
        {% endif %}

        <div class="footer">
            <span class="pill">{{ total }} vote{{ "s" if total != 1 else "" }} cast</span>
        </div>
    </div>
</body>
</html>
